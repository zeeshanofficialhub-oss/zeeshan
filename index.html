<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Personal Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      color: #38bdf8;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #38bdf8;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(to right, #0f172a, #1e293b);
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    footer {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <h1>👋 YOUR NAME</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Welcome to My Website 🚀</h2>
  <p>I am learning web development</p>
  <button class="btn">Contact Me</button>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I am a beginner developer. I build websites using GitHub.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  <p>© 2026 My Website</p>
</footer>

</body>
</html>
